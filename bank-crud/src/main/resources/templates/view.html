<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Details du compte</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #f2f6ff;
            --card: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #1d4ed8;
            --primary-hover: #1e40af;
            --border: #dbe6ff;
            --success-bg: #ecfdf3;
            --success-text: #0f7a45;
            --shadow: 0 12px 30px rgba(37, 99, 235, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at 10% 10%, rgba(30, 64, 175, 0.13) 0%, rgba(30, 64, 175, 0) 35%),
                radial-gradient(circle at 90% 85%, rgba(14, 165, 233, 0.15) 0%, rgba(14, 165, 233, 0) 35%),
                linear-gradient(180deg, #f8fbff 0%, #f1f5ff 100%);
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            top: -120px;
            left: -90px;
            background: rgba(59, 130, 246, 0.24);
        }

        body::after {
            bottom: -120px;
            right: -80px;
            background: rgba(14, 165, 233, 0.22);
        }

        .container {
            max-width: 950px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .title {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 18px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .meta-item {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
        }

        .meta-label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 15px;
            font-weight: 600;
        }

        .balance {
            display: inline-block;
            margin-top: 10px;
            background: var(--success-bg);
            color: var(--success-text);
            border-radius: 10px;
            padding: 8px 10px;
            font-weight: 700;
        }

        h3 {
            margin: 0 0 10px;
            font-size: 17px;
            color: #1e3a8a;
        }

        .block + .block {
            margin-top: 16px;
        }

        form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="number"] {
            flex: 1 1 180px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #f8fbff;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.12);
        }

        .btn {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            color: #fff;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.28);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.32);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        .empty {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            color: #9a3412;
            border-radius: 10px;
            padding: 14px;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #eaf1ff;
            border: 1px solid #cfe0ff;
            color: #1e3a8a;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="container">
    <span class="badge">Bank CRUD</span>
    <h1 class="title">Details du compte</h1>
    <p class="subtitle">Consultez les informations et effectuez vos operations</p>

    <div th:if="${account == null}" class="card">
        <p class="empty">Compte introuvable.</p>
        <div class="actions">
            <a class="btn btn-secondary" th:href="@{/accounts}">Retour a la liste</a>
        </div>
    </div>

    <div th:if="${account != null}" class="grid">
        <section class="card">
            <h3>Informations du compte</h3>
            <span class="balance" th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' MAD'">0.00 MAD</span>

            <div class="meta">
                <div class="meta-item">
                    <span class="meta-label">ID</span>
                    <span class="meta-value" th:text="${account.id}">1</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Titulaire</span>
                    <span class="meta-value" th:text="${account.accountHolder}">Nom Prenom</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Numero</span>
                    <span class="meta-value" th:text="${account.accountNumber}">ACC0001</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Cree le</span>
                    <span class="meta-value" th:text="${account.createdAt}">2026-01-01T00:00:00</span>
                </div>
            </div>

            <div class="actions">
                <a class="btn btn-primary" th:href="@{/accounts/edit/{id}(id=${account.id})}">Modifier</a>
                <a class="btn btn-secondary" th:href="@{/accounts}">Retour a la liste</a>
            </div>
        </section>

        <section class="card">
            <div class="block">
                <h3>Depot</h3>
                <form th:action="@{/accounts/deposit}" method="post">
                    <input type="hidden" name="id" th:value="${account.id}">
                    <input type="number" name="amount" min="0.01" step="0.01" placeholder="Montant a deposer" required>
                    <button class="btn btn-primary" type="submit">Deposer</button>
                </form>
            </div>

            <div class="block">
                <h3>Retrait</h3>
                <form th:action="@{/accounts/withdraw}" method="post">
                    <input type="hidden" name="id" th:value="${account.id}">
                    <input type="number" name="amount" min="0.01" step="0.01" placeholder="Montant a retirer" required>
                    <button class="btn btn-primary" type="submit">Retirer</button>
                </form>
            </div>
        </section>
    </div>
</main>

</body>
</html>
